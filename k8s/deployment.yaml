apiVersion: apps/v1
kind: Deployment
metadata:
  name: capstone-app-deployment
  namespace: capstone
  labels:
    app: capstone-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: capstone-app
  template:
    metadata:
      labels:
        app: capstone-app
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      
      containers:
      - name: capstone-app
        image: docker.io/wmiv/k8s-image:latest
        ports:
        - containerPort: 5670
        
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
        
        readinessProbe:
          httpGet:
            path: /health
            port: 5670
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 5670
          initialDelaySeconds: 15
          periodSeconds: 20
        
        env:
        - name: NODE_ENV
          value: "production"
